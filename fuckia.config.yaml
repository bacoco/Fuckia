version: 1
mode: strict

agents:
  claude:
    rules_file: CLAUDE.md
    skills_dir: .claude/skills
  codex:
    rules_file: AGENTS.md
    skills_dir: .agents/skills

github:
  workflows_dir: .github/workflows
  pr_template: .github/PULL_REQUEST_TEMPLATE.md
  strict_checks_enabled: true

linear:
  required: false
  issue_id_required_for_risky_work: true

verification:
  real_workflow_required_for_done: true
  typecheck_alone_is_done: false
  end_of_work_checkpoint_required: true

safety:
  block_self_review_for_risky_work: true
  block_parallel_implementation_without_file_ownership: true
  block_product_code_changes_during_install: true
