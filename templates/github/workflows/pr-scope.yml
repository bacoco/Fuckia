name: Fuckia PR Scope

on:
  pull_request:
  workflow_dispatch:

jobs:
  scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Report changed files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | tee changed-files.txt
          echo "Fuckia strict mode: review changed-files.txt against the PR allowed and forbidden file lists."
      - name: Enforce destructive change guard
        run: |
          deleted_lines="$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{sum += $2} END {print sum + 0}')"
          echo "Deleted lines: $deleted_lines"
          test "$deleted_lines" -le 400
