name: Fuckia Generated Skills

on:
  pull_request:
  workflow_dispatch:

jobs:
  generated-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check generated skill headers
        run: |
          for skill in adversarial-implementer-guard cross-agent-handoff delegated-review-and-merge destructive-change-guard end-of-work-checkpoint plan-review-gate platform-permission-gate real-verification-gate source-of-truth-gate; do
            test -f ".claude/skills/$skill/SKILL.md"
            test -f ".agents/skills/$skill/SKILL.md"
          done
          grep -R "GENERATED FILE - DO NOT EDIT DIRECTLY" .claude/skills .agents/skills
          grep -R "source_hash:" .claude/skills .agents/skills
